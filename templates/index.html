<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telco Churn Predictor</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green:  #ADEBB3;
            --coral:  #FF857A;
            --lilac:  #EBAEE6;
            --brown:  #6B403C;
            --brown-light: #9a6259;
            --bg:     #f7f3f0;
            --white:  #ffffff;
            --text:   #3a2826;
            --muted:  #7a5e5b;
            --border: #e2d5d3;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 32px 16px 48px;
            color: var(--text);
        }
        header { text-align: center; margin-bottom: 28px; }
        header h1 { font-size: 1.65rem; font-weight: 700; color: var(--brown); }
        header h1 span { color: var(--coral); }
        .subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }
        .tag {
            display: inline-block; background: var(--lilac); color: var(--brown);
            font-size: 0.72rem; font-weight: 600; padding: 2px 10px;
            border-radius: 20px; margin-top: 8px;
        }
        .card {
            background: var(--white); border-radius: 18px;
            box-shadow: 0 4px 24px rgba(107,64,60,0.10);
            width: 100%; max-width: 840px; overflow: hidden;
        }
        .card-stripe {
            height: 5px;
            background: linear-gradient(90deg, var(--green) 0%, var(--coral) 33%, var(--lilac) 66%, var(--brown) 100%);
        }
        .form-body { padding: 28px 32px 32px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 22px; }

        .section-strip {
            grid-column: 1 / -1;
            display: flex; align-items: center; gap: 8px;
            margin: 20px 0 8px;
        }
        .section-strip:first-child { margin-top: 0; }
        .strip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .strip-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--brown); }
        .strip-line { flex: 1; height: 1px; background: var(--border); }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
        .field select, .field input[type="number"] {
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 0.88rem; color: var(--text);
            background: #fdfcfc;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        .field select:focus, .field input[type="number"]:focus {
            outline: none; border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(255,133,122,0.15);
        }

        .btn-wrap { grid-column: 1 / -1; margin-top: 14px; }
        .btn {
            width: 100%; padding: 13px;
            background: var(--brown); color: #fff; border: none;
            border-radius: 10px; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; transition: background 0.18s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover  { background: var(--brown-light); }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .result-wrap { grid-column: 1 / -1; }
        .result { display: none; border-radius: 12px; padding: 22px 24px; margin-top: 8px; }
        .result.churn    { background: #fff3f2; border: 1.5px solid var(--coral); }
        .result.no-churn { background: #f3faf4; border: 1.5px solid var(--green); }

        .result-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
        .result-icon {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0;
        }
        .churn    .result-icon { background: rgba(255,133,122,0.18); }
        .no-churn .result-icon { background: rgba(173,235,179,0.4); }
        .result-headline { font-size: 1.05rem; font-weight: 700; }
        .churn    .result-headline { color: #c0392b; }
        .no-churn .result-headline { color: #1e6b35; }
        .result-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

        .prob-row { margin-bottom: 10px; }
        .prob-meta {
            display: flex; justify-content: space-between;
            font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 4px;
        }
        .prob-track { height: 8px; background: #ede8e7; border-radius: 4px; overflow: hidden; }
        .prob-fill { height: 100%; border-radius: 4px; transition: width 0.65s cubic-bezier(.4,0,.2,1); }
        .fill-churn    { background: linear-gradient(90deg, var(--coral), #d45f54); }
        .fill-no-churn { background: linear-gradient(90deg, var(--green), #6dc97a); }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 560px) {
            .grid { grid-template-columns: 1fr; }
            .form-body { padding: 20px 16px 24px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Telco <span>Churn</span> Predictor</h1>
    <div class="subtitle">
        Aye Khin Khin Hpone (Yolanda Lim) · ST125970 &nbsp;·&nbsp; Subhana Chitrakar · ST126138
    </div>
    <span class="tag">Logistic Regression Pipeline · Machine Learning</span>
</header>

<div class="card">
    <div class="card-stripe"></div>
    <div class="form-body">
        <div class="grid">

            <div class="section-strip">
                <div class="strip-dot" style="background:#ADEBB3"></div>
                <span class="strip-label">Demographics</span>
                <div class="strip-line"></div>
            </div>
            <div class="field"><label>Gender</label>
                <select id="gender"><option value="Female">Female</option><option value="Male">Male</option></select>
            </div>
            <div class="field"><label>Senior Citizen</label>
                <select id="SeniorCitizen"><option value="0">No</option><option value="1">Yes</option></select>
            </div>
            <div class="field"><label>Partner</label>
                <select id="Partner"><option value="No">No</option><option value="Yes">Yes</option></select>
            </div>
            <div class="field"><label>Dependents</label>
                <select id="Dependents"><option value="No">No</option><option value="Yes">Yes</option></select>
            </div>

            <div class="section-strip">
                <div class="strip-dot" style="background:#FF857A"></div>
                <span class="strip-label">Account & Billing</span>
                <div class="strip-line"></div>
            </div>
            <div class="field"><label>Tenure (months)</label>
                <input type="number" id="tenure" value="12" min="0" max="72">
            </div>
            <div class="field"><label>Monthly Charges ($)</label>
                <input type="number" id="MonthlyCharges" value="50.00" min="0" step="0.01">
            </div>
            <div class="field"><label>Total Charges ($)</label>
                <input type="number" id="TotalCharges" value="600.00" min="0" step="0.01">
            </div>
            <div class="field"><label>Contract</label>
                <select id="Contract">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>
            </div>
            <div class="field"><label>Paperless Billing</label>
                <select id="PaperlessBilling"><option value="No">No</option><option value="Yes">Yes</option></select>
            </div>
            <div class="field"><label>Payment Method</label>
                <select id="PaymentMethod">
                    <option value="Electronic check">Electronic check</option>
                    <option value="Mailed check">Mailed check</option>
                    <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                    <option value="Credit card (automatic)">Credit card (automatic)</option>
                </select>
            </div>

            <div class="section-strip">
                <div class="strip-dot" style="background:#EBAEE6"></div>
                <span class="strip-label">Phone Services</span>
                <div class="strip-line"></div>
            </div>
            <div class="field"><label>Phone Service</label>
                <select id="PhoneService"><option value="No">No</option><option value="Yes">Yes</option></select>
            </div>
            <div class="field"><label>Multiple Lines</label>
                <select id="MultipleLines">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No phone service">No phone service</option>
                </select>
            </div>

            <div class="section-strip">
                <div class="strip-dot" style="background:#6B403C"></div>
                <span class="strip-label">Internet Services</span>
                <div class="strip-line"></div>
            </div>
            <div class="field"><label>Internet Service</label>
                <select id="InternetService">
                    <option value="DSL">DSL</option><option value="Fiber optic">Fiber optic</option><option value="No">No</option>
                </select>
            </div>
            <div class="field"><label>Online Security</label>
                <select id="OnlineSecurity">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="field"><label>Online Backup</label>
                <select id="OnlineBackup">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="field"><label>Device Protection</label>
                <select id="DeviceProtection">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="field"><label>Tech Support</label>
                <select id="TechSupport">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="field"><label>Streaming TV</label>
                <select id="StreamingTV">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="field"><label>Streaming Movies</label>
                <select id="StreamingMovies">
                    <option value="No">No</option><option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="btn-wrap">
                <button class="btn" id="predictBtn" onclick="predict()">Predict Churn</button>
            </div>

            <div class="result-wrap">
                <div class="result" id="result">
                    <div class="result-top">
                        <div class="result-icon" id="resultIcon"></div>
                        <div>
                            <div class="result-headline" id="resultHeadline"></div>
                            <div class="result-sub" id="resultSub"></div>
                        </div>
                    </div>
                    <div class="prob-row">
                        <div class="prob-meta"><span>Churn Probability</span><span id="probChurnPct"></span></div>
                        <div class="prob-track"><div class="prob-fill fill-churn" id="barChurn" style="width:0%"></div></div>
                    </div>
                    <div class="prob-row">
                        <div class="prob-meta"><span>No Churn Probability</span><span id="probNoChurnPct"></span></div>
                        <div class="prob-track"><div class="prob-fill fill-no-churn" id="barNoChurn" style="width:0%"></div></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const FIELDS = [
        'gender','SeniorCitizen','Partner','Dependents',
        'tenure','MonthlyCharges','TotalCharges',
        'PhoneService','MultipleLines','InternetService',
        'OnlineSecurity','OnlineBackup','DeviceProtection',
        'TechSupport','StreamingTV','StreamingMovies',
        'Contract','PaperlessBilling','PaymentMethod'
    ];

    async function predict() {
        const btn = document.getElementById('predictBtn');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Predicting…';

        const data = {};
        FIELDS.forEach(f => { data[f] = document.getElementById(f).value; });

        try {
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const r = await res.json();

            const el = document.getElementById('result');
            el.style.display = 'block';
            document.getElementById('barChurn').style.width  = '0%';
            document.getElementById('barNoChurn').style.width = '0%';

            if (r.prediction === 1) {
                el.className = 'result churn';
                document.getElementById('resultIcon').textContent     = '⚠️';
                document.getElementById('resultHeadline').textContent = 'This customer is likely to CHURN';
            } else {
                el.className = 'result no-churn';
                document.getElementById('resultIcon').textContent     = '✅';
                document.getElementById('resultHeadline').textContent = 'This customer is likely to STAY';
            }
            document.getElementById('resultSub').textContent        = `Confidence: ${r.confidence}%`;
            document.getElementById('probChurnPct').textContent     = r.prob_churn + '%';
            document.getElementById('probNoChurnPct').textContent   = r.prob_no_churn + '%';

            setTimeout(() => {
                document.getElementById('barChurn').style.width  = r.prob_churn + '%';
                document.getElementById('barNoChurn').style.width = r.prob_no_churn + '%';
            }, 80);
        } catch (err) {
            alert('Prediction failed. Make sure the Flask server is running.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Predict Churn';
        }
    }
</script>
</body>
</html>
